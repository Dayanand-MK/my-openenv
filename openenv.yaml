name: email-triage-env
version: "1.0.0"
description: >
  An OpenEnv environment that trains and evaluates AI agents on real-world
  email handling tasks: classification, prioritisation, and reply drafting.
author: "Team"
tags:
  - openenv
  - email
  - triage
  - nlp
  - real-world

environment:
  class: EmailTriageEnv
  module: environment

entry_point: "server.app:app"

observation_space:
  type: object
  description: >
    Typed EmailTriageObservation containing task id, emails list,
    instruction, step number, max steps, and optional feedback.

action_space:
  type: object
  description: >
    EmailTriageAction with classifications (task1), priority_order (task2),
    or reply (task3).

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Partial-credit reward at every step.

tasks:
  - id: task1
    name: Email Classification
    difficulty: easy
    description: >
      Classify 8 emails into spam | urgent | billing | support | general.
    max_steps: 3

  - id: task2
    name: Inbox Prioritisation
    difficulty: medium
    description: >
      Rank 10 emails from most urgent to least urgent.
    max_steps: 4

  - id: task3
    name: Professional Reply Drafting
    difficulty: hard
    description: >
      Draft a professional empathetic reply to a complaint email.
    max_steps: 5

endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state

baseline_scores:
  task1: 0.72
  task2: 0.61
  task3: 0.55